        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f7f6;
            color: #333;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.2em;
            font-weight: 600;
        }
        .month-selector {
            text-align: center;
            margin-bottom: 40px;
        }
        .month-selector label {
            font-size: 1.1em;
            margin-right: 15px;
            color: #555;
            font-weight: 500;
        }
        .month-selector select {
            padding: 10px 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 1em;
            background-color: #fdfdfd;
            cursor: pointer;
            transition: border-color 0.3s ease;
        }
        .month-selector select:focus {
            border-color: #007bff;
            outline: none;
            box-shadow: 0 0 0 3px rgba(0, 123, 255, 0.25);
        }
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }
        .indicator-card {
            background-color: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.07);
            padding: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            border: 1px solid #e0e0e0;
        }
        .indicator-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
        }
        .indicator-card h3 {
            margin-top: 15px;
            margin-bottom: 10px;
            color: #34495e;
            font-size: 1.3em;
            font-weight: 600;
        }
        .indicator-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #007bff;
            margin-bottom: 10px;
        }
        .indicator-classification {
            font-size: 0.95em;
            color: #666;
            margin-bottom: 5px;
        }
        .indicator-interpretation {
            font-size: 0.85em;
            color: #888;
            line-height: 1.4;
            min-height: 40px; /* Para manter o layout consistente */
        }
        .donut-chart-container {
            position: relative;
            width: 120px;
            height: 120px;
            margin-bottom: 15px;
        }
        .donut-chart {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(
                var(--color-part1) 0% var(--angle-part1),
                var(--color-part2) var(--angle-part1) var(--angle-part2),
                #e0e0e0 var(--angle-part2) 100%
            );
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            font-weight: bold;
            color: #333;
        }
        .donut-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80px;
            height: 80px;
            background-color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.9em;
            font-weight: 600;
            color: #555;
        }
        .chart-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.9em;
            font-weight: bold;
            color: #333;
            z-index: 2;
        }
        .chart-inner-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%; /* Tamanho do buraco do donut */
            height: 70%;
            background-color: #fff;
            border-radius: 50%;
            z-index: 1;
        }
        .category-title {
            grid-column: 1 / -1;
            text-align: left;
            font-size: 1.6em;
            color: #2c3e50;
            margin-top: 40px;
            margin-bottom: 20px;
            border-bottom: 2px solid #007bff;
            padding-bottom: 10px;
            font-weight: 600;
        }
        .alert-message {
            text-align: center;
            padding: 20px;
            background-color: #ffe0b2; /* Light orange */
            border-left: 5px solid #ff9800; /* Orange */
            margin-top: 30px;
            border-radius: 8px;
            font-size: 1.1em;
            color: #333;
        }
    </style>

        function createDonutChart(part1, part2, color1, color2, label) {
            const angle1 = (part1 / (part1 + part2)) * 360;
            const angle2 = (part2 / (part1 + part2)) * 360;

            return `
                <div class="donut-chart-container">
                    <div class="donut-chart" style="
                        --color-part1: ${color1};
                        --color-part2: ${color2};
                        --angle-part1: ${angle1}deg;
                        --angle-part2: ${angle1 + angle2}deg;
                    ">
                        <div class="donut-center">${label}</div>
                    </div>
                </div>
            `;
        }

        function renderDashboard(month) {
            const dashboardContent = document.getElementById('dashboardContent');
            dashboardContent.innerHTML = ''; // Limpa o conteúdo existente

            const monthData = allMonthsData[month];

            if (!monthData) {
                dashboardContent.innerHTML = '<div class="alert-message">Dados não disponíveis para o mês selecionado.</div>';
                return;
            }

            for (const category in monthData) {
                if (monthData.hasOwnProperty(category)) {
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category;
                    dashboardContent.appendChild(categoryTitle);

                    monthData[category].forEach(indicator => {
                        const card = document.createElement('div');
                        card.className = 'indicator-card';

                        // Formatação do valor para percentual se for o caso
                        let formattedValue = indicator.ValorAtual;
                        if (indicator.Indicador.includes('Margem') || indicator.Indicador.includes('ROE') || indicator.Indicador.includes('ROA') || indicator.Indicador.includes('Imobilização') || indicator.Indicador.includes('Participação')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(2)}%`;
                        } else if (indicator.Indicador.includes('Ciclo')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(0)} dias`;
                        } else {
                            formattedValue = indicator.ValorAtual.toFixed(2);
                        }

                        // Ajuste para valores negativos no donut, se necessário
                        let donutPart1 = indicator.DonutPart1;
                        let donutPart2 = indicator.DonutPart2;
                        let donutLabel = formattedValue;

                        if (indicator.ValorAtual < 0) {
                            // Para valores negativos, podemos mostrar 0% preenchido e o valor negativo no centro
                            donutPart1 = 0;
                            donutPart2 = 100;
                            donutLabel = formattedValue; // Mantém o valor negativo no centro
                        } else if (indicator.ValorAtual > indicator.Meta && indicator.Indicador.includes('Endividamento')) {
                            // Para endividamento, se o valor atual for maior que a meta, a meta é o que queremos atingir
                            donutPart1 = (indicator.Meta / indicator.ValorAtual) * 100;
                            donutPart2 = 100 - donutPart1;
                            donutLabel = formattedValue;
                        } else if (indicator.ValorAtual > indicator.Meta && !indicator.Indicador.includes('Endividamento')) {
                            // Para outros indicadores, se o valor atual for maior que a meta, mostramos 100% preenchido
                            donutPart1 = 100;
                            donutPart2 = 0;
                            donutLabel = formattedValue;
                        } else if (indicator.Meta !== 0) {
                            donutPart1 = (indicator.ValorAtual / indicator.Meta) * 100;
                            donutPart2 = 100 - donutPart1;
                            donutLabel = formattedValue;
                        } else {
                            donutPart1 = 0;
                            donutPart2 = 100;
                            donutLabel = formattedValue;
                        }

                        // Garante que as partes do donut não sejam negativas ou maiores que 100
                        donutPart1 = Math.max(0, Math.min(100, donutPart1));
                        donutPart2 = Math.max(0, Math.min(100, donutPart2));


                        card.innerHTML = `
                            ${createDonutChart(donutPart1, donutPart2, indicator.ColorPart1, indicator.ColorPart2, donutLabel)}
                            <h3>${indicator.Indicador}</h3>
                            <div class="indicator-value">${formattedValue}</div>
                            <div class="indicator-classification">Classificação: <strong>${indicator.Classificacao}</strong></div>
                            <div class="indicator-interpretation">${indicator.Interpretação}</div>
                            <div class="indicator-interpretation">Meta: ${indicator.Meta}</div>
                        `;
                        dashboardContent.appendChild(card);
                    });
                }
            }
        }

        // Event Listener para o seletor de mês
        document.getElementById('monthSelect').addEventListener('change', function() {
            renderDashboard(this.value);
        });

            document.getElementById('monthSelect').value = 'Jan'; // Define Janeiro como padrão
