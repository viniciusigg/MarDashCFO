                    { Indicador: "PME - Prazo Médio de Estoque", ValorAtual: 55.00, Meta: 30.0, Benchmark: "Ideal: < 30 dias", Classificacao: "Ruim", Interpretação: "Estoque permanece muito tempo na empresa." },
                    { Indicador: "PMR - Prazo Médio de Recebimento", ValorAtual: 65.00, Meta: 30.0, Benchmark: "Ideal: < 30 dias", Classificacao: "Ruim", Interpretação: "Prazo médio de recebimento é longo." },
                    { Indicador: "PMP - Prazo Médio de Pagamento", ValorAtual: 22.00, Meta: 65.0, Benchmark: "Ideal: > 65 dias", Classificacao: "Ruim", Interpretação: "A empresa paga seus fornecedores muito rapidamente." },
                    { Indicador: "CF - Ciclo Financeiro", ValorAtual: -2.10, Meta: 0.0, Benchmark: "Ideal: < 0 dias", Classificacao: "Boa", Interpretação: "Ciclo financeiro negativo, a empresa recebe antes de pagar." },
                    { Indicador: "CO - Ciclo Operacional", ValorAtual: 62.00, Meta: 80.0, Benchmark: "Ideal: < 80 dias", Classificacao: "Boa", Interpretação: "Ciclo operacional eficiente." },
                    { Indicador: "Giro do Ativo (GA)", ValorAtual: 0.31, Meta: 1.0, Benchmark: "Ideal: > 1.0", Classificacao: "Ruim", Interpretação: "Giro do ativo baixo, ativos não geram vendas eficientemente." },
                    { Indicador: "Giro de Caixa", ValorAtual: -65.00, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Ruim", Interpretação: "Giro de caixa negativo, a empresa não está gerando caixa." },
                    { Indicador: "CDG - Capital de Giro Líquido (em milhares)", ValorAtual: 8104.12, Meta: 5000.0, Benchmark: "Ideal: > 5000", Classificacao: "Boa", Interpretação: "Capital de giro líquido saudável." },
                    { Indicador: "NCG (em milhares)", ValorAtual: 306.71, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Boa", Interpretação: "Necessidade de Capital de Giro positiva, mas gerenciável." },
                    { Indicador: "Saldo de Tesouraria ST (em milhares)", ValorAtual: 169.24, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Boa", Interpretação: "Saldo de tesouraria positivo." }
                ]
            }
        };

        // Cores para classificação
        const colorGood = '#27ae60';    // Verde
        const colorRegular = '#f39c12'; // Amarelo
        const colorBad = '#e74c3c';     // Vermelho
        const colorNeutral = '#95a5a6'; // Cinza para casos sem classificação clara ou neutros

        function createDonutChart(value, meta, classification, label, isLowerBetter) {
            let percentage = 0;
            let color = getClassificationColor(classification);

            // Lógica de preenchimento do donut
            if (meta === 0) { // Evita divisão por zero
                percentage = value > 0 ? 100 : 0;
            } else if (isLowerBetter) { // Menor é melhor (ex: Endividamento)
                if (value <= meta) { // Se o valor é menor ou igual à meta (bom)
                    percentage = 100;
                } else { // Se o valor é maior que a meta (ruim)
                    // Quanto mais longe da meta (pior), menor o preenchimento
                    percentage = Math.max(0, 100 - ((value - meta) / meta) * 100);
                }
            } else { // Maior é melhor (ex: Lucratividade)
                if (value >= meta) { // Se o valor é maior ou igual à meta (bom)
                    percentage = 100;
                } else { // Se o valor é menor que a meta (ruim)
                    percentage = (value / meta) * 100;
                }
            }

            // Garante que a porcentagem esteja entre 0 e 100
            percentage = Math.max(0, Math.min(100, percentage));

            const anglePart1 = percentage * 3.6; // 360 graus * (porcentagem / 100)

            return `
                <div class="donut-chart-container">
                    <div class="donut-chart" style="
                        --color-part1: ${color};
                        --color-part2: ${color};
                        --angle-part1: ${anglePart1}deg;
                        --angle-part2: ${anglePart1}deg;
                    ">
                        <div class="donut-center">${label}</div>
                    </div>
                </div>
            `;
        }

        function renderDashboard(month) {
            const dashboardContent = document.getElementById('dashboardContent');
            dashboardContent.innerHTML = ''; // Limpa o conteúdo existente

            const monthData = allMonthsData[month];

            if (!monthData) {
                dashboardContent.innerHTML = '<div class="alert-message">Dados não disponíveis para o mês selecionado.</div>';
                return;
            }

            for (const category in monthData) {
                if (monthData.hasOwnProperty(category)) {
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category.replace(/_/g, ' '); // Substitui _ por espaço
                    dashboardContent.appendChild(categoryTitle);

                    monthData[category].forEach(indicator => {
                        const card = document.createElement('div');
                        card.className = 'indicator-card';

                        let formattedValue = indicator.ValorAtual;
                        let isLowerBetter = false; // Flag para indicadores onde menor é melhor

                        // Determinar se o indicador é "menor é melhor"
                        if (indicator.Interpretação.includes('menor é melhor') || indicator.Indicador.includes('Endividamento') || indicator.Indicador.includes('Imobilização') || indicator.Indicador.includes('Participação Capital Terceiros') || indicator.Indicador.includes('PME') || indicator.Indicador.includes('PMR') || indicator.Indicador.includes('CF - Ciclo Financeiro') || indicator.Indicador.includes('CO - Ciclo Operacional') || indicator.Indicador.includes('PMP')) {
                            isLowerBetter = true;
                        }

                        // Formatação do valor
                        if (indicator.Indicador.includes('Margem') || indicator.Indicador.includes('ROE') || indicator.Indicador.includes('ROA') || indicator.Indicador.includes('Imobilização') || indicator.Indicador.includes('Participação') || indicator.Indicador.includes('EBITDA') || indicator.Indicador.includes('Endividamento Geral') || indicator.Indicador.includes('CE - Composição do Endividamento') || indicator.Indicador.includes('Composição do Endividamento')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(2)}%`;
                        } else if (indicator.Indicador.includes('Ciclo') || indicator.Indicador.includes('PME') || indicator.Indicador.includes('PMR') || indicator.Indicador.includes('PMP')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(0)} dias`;
                        } else if (indicator.Indicador.includes('milhares')) {
                            formattedValue = `R$ ${indicator.ValorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                        } else {
                            formattedValue = indicator.ValorAtual.toFixed(2);
                        }

                        const classificationText = indicator.Classificacao;

                        card.innerHTML = `
                            ${createDonutChart(indicator.ValorAtual, indicator.Meta, classificationText, formattedValue, isLowerBetter)}
                            <h3>${indicator.Indicador}</h3>
                            <div class="indicator-value">${formattedValue}</div>
                            <div class="indicator-classification">Classificação: <strong style="color: ${getClassificationColor(classificationText)};">${classificationText}</strong></div>
                            <div class="indicator-interpretation">${indicator.Interpretação}</div>
                            <div class="indicator-benchmark">Benchmark: ${indicator.Benchmark}</div>
                        `;
                        dashboardContent.appendChild(card);
                    });
                }
            }
        }

        function getClassificationColor(classification) {
            if (classification === "Boa") return colorGood;
            if (classification === "Regular") return colorRegular;
            if (classification === "Ruim") return colorBad;
            return colorNeutral;
        }

        // Event Listener para o seletor de mês
        document.getElementById('monthSelect').addEventListener('change', function() {
            renderDashboard(this.value);
        });

        // Renderiza o dashboard com o mês de Janeiro por padrão ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('monthSelect').value = 'Jan'; // Define Janeiro como padrão
            renderDashboard('Jan');
        });
    </script>
</body>
