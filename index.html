                    { Indicador: "Margem Líquida s/ Vendas", ValorAtual: 2.00, Meta: 20.0, Benchmark: "Ideal: > 20%", Classificacao: "Ruim", Interpretação: "A margem líquida baixa sugere que a empresa tem pouca lucratividade após todos os custos e impostos." }
                ],
                "Rentabilidade": [
                    { Indicador: "ROE", ValorAtual: 6.01, Meta: 20.0, Benchmark: "Ideal: > 20%", Classificacao: "Ruim", Interpretação: "O ROE baixo indica um retorno insatisfatório sobre o capital próprio." },
                    { Indicador: "ROA", ValorAtual: 72.04, Meta: 150.0, Benchmark: "Ideal: > 150%", Classificacao: "Ruim", Interpretação: "O ROA baixo indica que a empresa não está gerando lucro suficiente a partir de seus ativos." }
                ],
                "Estrutura": [
                    { Indicador: "Imobilização do Capital Proprio", ValorAtual: 62.00, Meta: 100.0, Benchmark: "Ideal: < 100%", Classificacao: "Boa", Interpretação: "Boa imobilização, indicando que o capital próprio cobre os ativos fixos." },
                    { Indicador: "Endividamento Geral", ValorAtual: 96.42, Meta: 70.0, Benchmark: "Ideal: ≤ 70%", Classificacao: "Ruim", Interpretação: "Alto endividamento geral, a empresa depende muito de capital de terceiros." },
                    { Indicador: "PCT - Participação de Capitais de Terceiros", ValorAtual: 108.41, Meta: 125.0, Benchmark: "Ideal: < 125%", Classificacao: "Boa", Interpretação: "A participação de capitais de terceiros está dentro de um limite aceitável." },
                    { Indicador: "CE - Composição do Endividamento", ValorAtual: 59.61, Meta: 50.0, Benchmark: "Ideal: ≤ 50%", Classificacao: "Ruim", Interpretação: "A maior parte do endividamento é de curto prazo, o que pode gerar pressão de caixa." }
                ],
                "Atividade": [
                    { Indicador: "PME", ValorAtual: 33.02, Meta: 30.0, Benchmark: "Ideal: < 30 dias", Classificacao: "Ruim", Interpretação: "O prazo médio de estocagem é alto, indicando capital parado em estoque." },
                    { Indicador: "PMR", ValorAtual: 15.00, Meta: 30.0, Benchmark: "Ideal: < 30 dias", Classificacao: "Boa", Interpretação: "Bom prazo médio de recebimento, indicando eficiência na cobrança." },
                    { Indicador: "PMP", ValorAtual: 41.00, Meta: 65.0, Benchmark: "Ideal: > 65 dias", Classificacao: "Regular", Interpretação: "O prazo médio de pagamento é razoável, mas pode ser estendido para melhorar o fluxo de caixa." },
                    { Indicador: "CF - Ciclo Financeiro", ValorAtual: 7.02, Meta: 0.0, Benchmark: "Ideal: < 0 dias", Classificacao: "Ruim", Interpretação: "Ciclo financeiro positivo, a empresa paga antes de receber." },
                    { Indicador: "CO - Ciclo Operacional", ValorAtual: 48.02, Meta: 80.0, Benchmark: "Ideal: < 80 dias", Classificacao: "Boa", Interpretação: "Ciclo operacional eficiente, o tempo entre a compra e o recebimento é adequado." },
                    { Indicador: "Giro do Ativo (GA)", ValorAtual: 0.36, Meta: 1.0, Benchmark: "Ideal: > 1.0", Classificacao: "Ruim", Interpretação: "O giro do ativo é baixo, indicando que os ativos não estão gerando vendas de forma eficiente." },
                    { Indicador: "Giro de Caixa", ValorAtual: 51.28, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Boa", Interpretação: "Giro de caixa positivo, indicando que a empresa está gerando caixa de suas operações." },
                    { Indicador: "CDG - Capital de Giro Líquido (em milhares)", ValorAtual: 8104.12, Meta: 5000.0, Benchmark: "Ideal: > 5000", Classificacao: "Boa", Interpretação: "Capital de giro líquido saudável, a empresa tem recursos para operar." },
                    { Indicador: "NCG (em milhares)", ValorAtual: 306.71, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Boa", Interpretação: "Necessidade de Capital de Giro positiva, mas gerenciável." },
                    { Indicador: "Saldo de Tesouraria ST (em milhares)", ValorAtual: 169.24, Meta: 0.0, Benchmark: "Ideal: > 0", Classificacao: "Boa", Interpretação: "Saldo de tesouraria positivo, indicando boa gestão de caixa." }
                ]
            }
        };

        // Cores para classificação
        const colorGood = '#27ae60';    // Verde
        const colorRegular = '#f39c12'; // Amarelo
        const colorBad = '#e74c3c';     // Vermelho
        const colorNeutral = '#95a5a6'; // Cinza para casos sem classificação clara ou neutros

        function createDonutChart(value, meta, classification, label, isLowerBetter) {
            let percentage = 0;
            let color = colorNeutral;

            // Lógica de preenchimento do donut e cor baseada na classificação
            if (classification === "Boa") {
                color = colorGood;
            } else if (classification === "Regular") {
                color = colorRegular;
            } else if (classification === "Ruim") {
                color = colorBad;
            }

            // Cálculo da porcentagem para o donut
            if (meta === 0) { // Evita divisão por zero
                percentage = value > 0 ? 100 : 0;
            } else if (isLowerBetter) { // Menor é melhor (ex: Endividamento)
                if (value <= meta) { // Se o valor é menor ou igual à meta (bom)
                    percentage = 100; // Preenche 100% com a cor da classificação
                } else { // Se o valor é maior que a meta (ruim)
                    // Calcula o quão "ruim" ele está em relação à meta, para preencher o donut
                    // Pode ser uma lógica inversa ou simplesmente um percentual fixo para "ruim"
                    percentage = Math.max(0, 100 - ((value - meta) / meta) * 100);
                }
            } else { // Maior é melhor (ex: Lucratividade)
                if (value >= meta) { // Se o valor é maior ou igual à meta (bom)
                    percentage = 100; // Preenche 100% com a cor da classificação
                } else { // Se o valor é menor que a meta (ruim)
                    percentage = (value / meta) * 100;
                }
            }

            // Garante que a porcentagem esteja entre 0 e 100
            percentage = Math.max(0, Math.min(100, percentage));

            const anglePart1 = percentage * 3.6; // 360 graus * (porcentagem / 100)

            return `
                <div class="donut-chart-container">
                    <div class="donut-chart" style="
                        --color-part1: ${color};
                        --color-part2: ${color};
                        --angle-part1: ${anglePart1}deg;
                        --angle-part2: ${anglePart1}deg;
                    ">
                        <div class="donut-center">${label}</div>
                    </div>
                </div>
            `;
        }

        function renderDashboard(month) {
            const dashboardContent = document.getElementById('dashboardContent');
            dashboardContent.innerHTML = ''; // Limpa o conteúdo existente

            const monthData = allMonthsData[month];

            if (!monthData) {
                dashboardContent.innerHTML = '<div class="alert-message">Dados não disponíveis para o mês selecionado.</div>';
                return;
            }

            for (const category in monthData) {
                if (monthData.hasOwnProperty(category)) {
                    const categoryTitle = document.createElement('h2');
                    categoryTitle.className = 'category-title';
                    categoryTitle.textContent = category.replace(/_/g, ' '); // Substitui _ por espaço
                    dashboardContent.appendChild(categoryTitle);

                    monthData[category].forEach(indicator => {
                        const card = document.createElement('div');
                        card.className = 'indicator-card';

                        let formattedValue = indicator.ValorAtual;
                        let isLowerBetter = false; // Flag para indicadores onde menor é melhor

                        // Determinar se o indicador é "menor é melhor"
                        if (indicator.Interpretação.includes('menor é melhor') || indicator.Indicador.includes('Endividamento') || indicator.Indicador.includes('Imobilização') || indicator.Indicador.includes('Participação Capital Terceiros') || indicator.Indicador.includes('PME') || indicator.Indicador.includes('PMR') || indicator.Indicador.includes('CF - Ciclo Financeiro') || indicator.Indicador.includes('CO - Ciclo Operacional')) {
                            isLowerBetter = true;
                        }

                        // Formatação do valor
                        if (indicator.Indicador.includes('Margem') || indicator.Indicador.includes('ROE') || indicator.Indicador.includes('ROA') || indicator.Indicador.includes('Imobilização') || indicator.Indicador.includes('Participação') || indicator.Indicador.includes('EBITDA') || indicator.Indicador.includes('Endividamento Geral') || indicator.Indicador.includes('CE - Composição do Endividamento')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(2)}%`;
                        } else if (indicator.Indicador.includes('Ciclo') || indicator.Indicador.includes('PME') || indicator.Indicador.includes('PMR') || indicator.Indicador.includes('PMP')) {
                            formattedValue = `${indicator.ValorAtual.toFixed(0)} dias`;
                        } else if (indicator.Indicador.includes('milhares')) {
                            formattedValue = `R$ ${indicator.ValorAtual.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                        } else {
                            formattedValue = indicator.ValorAtual.toFixed(2);
                        }

                        // Lógica para determinar a cor do donut e classificação
                        let classificationText = indicator.Classificacao; // Usa a classificação do dado

                        card.innerHTML = `
                            ${createDonutChart(indicator.ValorAtual, indicator.Meta, classificationText, formattedValue, isLowerBetter)}
                            <h3>${indicator.Indicador}</h3>
                            <div class="indicator-value">${formattedValue}</div>
                            <div class="indicator-classification">Classificação: <strong style="color: ${getClassificationColor(classificationText)};">${classificationText}</strong></div>
                            <div class="indicator-interpretation">${indicator.Interpretação}</div>
                            <div class="indicator-benchmark">Benchmark: ${indicator.Benchmark}</div>
                        `;
                        dashboardContent.appendChild(card);
                    });
                }
            }
        }

        function getClassificationColor(classification) {
            if (classification === "Boa") return colorGood;
            if (classification === "Regular") return colorRegular;
            if (classification === "Ruim") return colorBad;
            return colorNeutral;
        }

        // Event Listener para o seletor de mês
        document.getElementById('monthSelect').addEventListener('change', function() {
            renderDashboard(this.value);
        });

        // Renderiza o dashboard com o mês de Janeiro por padrão ao carregar a página
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('monthSelect').value = 'Jan'; // Define Janeiro como padrão
            renderDashboard('Jan');
        });
    </script>
</body>
